name: CI

on:
  push:
    branches: [master, main]
  pull_request:


jobs:
  lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"

      - name: Cache raw data sources
        uses: actions/cache@v6
        id: cache-data
        with:
          path: data/raw
          key: rime-cantonese-unihan-${{ hashFiles('scripts/fetch_data.py') }}

      - name: Fetch raw data sources
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: uv run python scripts/fetch_data.py

      - name: Build binary dicts
        run: uv run python scripts/build_dict.py

      - name: Rust tests
        run: cargo test

      - name: Build & install wheel
        run: uv run --with maturin maturin develop --uv

      - name: Python tests
        run: uv run --group dev pytest tests/ -v
