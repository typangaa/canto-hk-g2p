name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── Build wheels for each platform ──────────────────────────────────────────

  linux:
    name: Build Linux wheels
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Cache raw data sources
        uses: actions/cache@v4
        id: cache-data
        with:
          path: data/raw
          key: rime-cantonese-unihan-${{ hashFiles('scripts/fetch_data.py') }}

      - name: Fetch raw data sources
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: uv run python scripts/fetch_data.py

      - name: Build binary dicts
        run: uv run python scripts/build_dict.py

      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
        env:
          # Allow building against Python 3.14+ (newer than pyo3's declared max)
          # using the stable ABI. Remove once pyo3 declares support for 3.14.
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    name: Build macOS wheels
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Cache raw data sources
        uses: actions/cache@v4
        id: cache-data
        with:
          path: data/raw
          key: rime-cantonese-unihan-${{ hashFiles('scripts/fetch_data.py') }}

      - name: Fetch raw data sources
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: uv run python scripts/fetch_data.py

      - name: Build binary dicts
        run: uv run python scripts/build_dict.py

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: Build Windows wheels
    runs-on: windows-latest
    env:
      # Windows stdout defaults to CP1252; force UTF-8 so non-ASCII
      # characters in script output don't crash the process.
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Cache raw data sources
        uses: actions/cache@v4
        id: cache-data
        with:
          path: data/raw
          key: rime-cantonese-unihan-${{ hashFiles('scripts/fetch_data.py') }}

      - name: Fetch raw data sources
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: uv run python scripts/fetch_data.py

      - name: Build binary dicts
        run: uv run python scripts/build_dict.py

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Fetch raw data sources
        run: uv run python scripts/fetch_data.py

      - name: Build binary dicts
        run: uv run python scripts/build_dict.py

      # maturin-action tries to pip install cffi/patchelf into the uv-managed
      # .venv, which lacks pip by default. Add pip first.
      - name: Add pip to uv venv
        run: uv pip install pip

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ── Publish to PyPI via OIDC trusted publisher ───────────────────────────────

  publish:
    name: Publish to PyPI
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
